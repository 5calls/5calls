
{{ define "main" }}
<main id="content" role="main" aria-live="polite" class="layout__main archive__single">
    <section class="call">
        <header class="call__header">
            <h1 class="call__title">{{ .Title }}</h1>
            <div class="call__reason">
                {{ .Content }}
            </div>
        </header>
    </section>
</main>
